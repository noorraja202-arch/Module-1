<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Border and container</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    </head>
     <body>
        <div class="container border border-dark p-3 my-3">
            <h1>I Love Bootstrap</h1>
            <p>I learned Bootstrap so fast</p>
        </div>
        <div class="container bg-primary text-white">
            <h1>Its so easy to learn and pick up </h1>
            <p>I love Bootstrap more then CSS</p>
        </div>
        <div class="container bg-danger text-black">
            <h1>I Love Bootstrap so so much</h1>
            <p>Bootstrap is the best</p>
        </div>
     </body>
</html>
