<!DOCTYPE html>
<html>
    <head>
        <title>Transform</title>
    </head>
    <style>
        div{
            width: 300px;
            height: 100px;
            background-color: grey;
            border: 1px solid black;
        }
        #div2{
            transform: rotateX(180deg);
        }
    </style>
    <body>
        <h1>rotate method</h1>
        <div id="div1">Codingal</div><br>
        <div id="div2">Codingal</div>
    </body>
</html>
