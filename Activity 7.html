<!DOCTYPE html>
<html>
    <head>
        <title>Lists in html</title>
    </head>
    <body>
        <h2> School Suplies</h2>
        <ol>
            <li>backpack</li>
            <li>led pencils</li>
            <li>notebooks</li>

        </ol>
        <h2>grocerry list</h2>
        <ul>
            <li>hello panda</li>
            <li>granola bars</li>
            <li>cereal</li>
        </ul>
        <h2>definition</h2>
        <dl>
            <dt>tea</dt>
            <dd>it has caffine</dd>
            <dt>juice</dt>
            <dd>it is sweet</dd>
        </dl>
    </body>
</html>
