<!DOCTYPE html>
<html>
    <head>
        <title>Float Properties</title>
        <style>
            #img1{
                width: 100px;
                height: 100px;
                float: left;
            }
            #img2{
                width: 100px;
                height: 100px;
                float: right;
            }
        </style>
    </head>
    <body>
        <h1>Floating image</h1>
        <p>In this example the image will float to the right of the text and the text will wrap around the image. </p>
        <p>
        <img src="Basketball.jpg" id="img1">
         <img src="Basketball.jpg" id="img2">
         This is a dummy contant used to explore floating properties 
         </p>
    </body>
</html>
