<!DOCTYPE html>
<html>
    <head>
        <title>CSS Box Model Example</title>
        <style>
            .p1{
                width: 220px;
                background-color: blue;
                padding: 0px;
                border: 0px;
                margin: 0px;
            }
            .p2{
                width: 250px;
                background-color: red;
                color: white;
                padding: 50px;
                border: 5px solid black;
                margin: 40px 20px;

            }
        </style>
    </head>
    <body>
        <h1>Box Model</h1>
        <p class="p1">This is the example one contant</p>
        <p class="p2">This is another example</p>
    </body>
</html>
