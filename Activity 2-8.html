<!DOCTYPE html>
<html>
    <head>
        <title>Text Shadow</title>
        <style>
            #head1{
              text-shadow: 2px 2px 1px blue;
            }
            #head2{
                box-shadow: 9px 9px 5px lightblue;
            }
            #p1{
                text-indent: 50%;
            }
        </style>
    </head>
    <body>
        <h1 id="head1">We can use text shadow to give the text a shadow </h1>
        <h1 id="head2">We can use box shadow to give shadow to the element</h1>
        <div>
            <p>This is an exammple of text indent</p>
            <p id="p1">This is an example of text indent </p>
        </div>
    </body>
</html>
