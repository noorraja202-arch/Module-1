<!DOCTYPE html>
<html>
    <head>
        <title>Animation code </title>
        <style>
            #anim{
                width: 100px;
                height: 100px;
                background-color: red;
                animation-name: example;
                animation-duration: 4s;
            }
            @keyframes example{
                0% {background-color: red;}
                25% {background-color: yellow;}
                50% {background-color: orange;}
                100% {background-color: green;}
            }
        </style>
    </head>
    <body>
        <div id="anim"></div>
    </body>
</html>
